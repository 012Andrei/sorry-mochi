<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorry mochiii🥺</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
text-align:center;
overflow:hidden;
background:linear-gradient(-45deg,#ffd6e7,#ffeef6,#ffd9ec,#ffe4f4);
background-size:400% 400%;
animation:bg 12s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* glass card */

.card{
width:85%;
max-width:380px;
margin:120px auto 40px auto;
padding:30px;

background:rgba(255,255,255,0.25);
backdrop-filter:blur(15px);
border-radius:20px;

box-shadow:
0 10px 30px rgba(0,0,0,0.15),
0 0 30px rgba(255,120,170,0.2);

animation:floatCard 4s ease-in-out infinite;
}

@keyframes floatCard{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-6px);}
}

h1{
color:#ff4d6d;
}

#gif{
width:180px;
border-radius:14px;
margin:15px 0;
}

#message{
font-size:18px;
min-height:60px;
}

/* buttons */

.buttons{
display:flex;
flex-direction:column;
align-items:center;
gap:15px;
}

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:14px;
cursor:pointer;
transition:0.25s;
}

#yes{
background:#ff4d6d;
color:white;
position:relative;
}

#no{
background:#888;
color:white;
}

/* floating hearts */

.heart{
position:absolute;
color:#ff6b81;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
from{transform:translateY(100vh);opacity:1;}
to{transform:translateY(-10vh);opacity:0;}
}

/* orbit hearts */

.orbit{
position:absolute;
font-size:18px;
animation:orbit 3s linear infinite;
}

@keyframes orbit{
from{transform:rotate(0deg) translateX(30px) rotate(0deg);}
to{transform:rotate(360deg) translateX(30px) rotate(-360deg);}
}

/* confetti */

.confetti{
position:fixed;
top:-20px;
font-size:25px;
animation:fall 3s linear forwards;
z-index:9999;
}

@keyframes fall{
from{transform:translateY(0) rotate(0deg);}
to{transform:translateY(100vh) rotate(360deg);}
}

/* loading */

.loading{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:30px;
color:#ff4d6d;
font-weight:bold;
}

.pulse{
font-size:45px;
margin-top:20px;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%,100%{opacity:0.4;}
50%{opacity:1;}
}

/* ending */

.ending{
padding:40px;
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:scale(.9);}
to{opacity:1;transform:scale(1);}
}

</style>
</head>

<body>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_2a7b0a1c9e.mp3">
</audio>

<div class="card">

<h1>I'm really sorry Mochiiii🥺</h1>

<img id="gif" src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif">

<p id="message"></p>

</div>

<div class="buttons">

<button id="yes">Okay... I'll hear you out 🙄</button>
<button id="no">Still mad 😤</button>

</div>

<script>

/* start music */

document.body.addEventListener("click",()=>{
document.getElementById("music").play()
},{once:true})

/* floating hearts */

function createHeart(){

const heart=document.createElement("div")
heart.classList.add("heart")
heart.innerHTML="💖"

heart.style.left=Math.random()*100+"vw"
heart.style.fontSize=(15+Math.random()*20)+"px"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),6000)

}

setInterval(createHeart,500)

/* TYPEWRITER FUNCTION */

function typeWriter(text){

message.innerHTML=""
let i=0

function typing(){

if(i < text.length){
message.innerHTML += text.charAt(i)
i++
setTimeout(typing,30)
}

}

typing()

}

/* apology steps */

const apologies=[
{
text:"I know I messed up. sorryyy didn't mean to annoy u that much, me just want to see u that badly :< u still mad?",
gif:"https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif"
},
{
text:"You mean so much to me. I only did that because i wuv u :< dont be maaad na di bagay pag di ka naka smile",
gif:"https://media.giphy.com/media/9Y5BbDSkSTiY8/giphy.gif"
},
{
text:"Sorry di na po mauulit, mag bebehave na me 🥺",
gif:"https://media.giphy.com/media/l378giAZgxPw3eO52/giphy.gif"
}
]

const dodgeMessages=[
"hoy sorry na ngaaaa",
"wag ka na magalit T-T",
"u still mad at me? :<",
"wag mo na press yaaaan",
"waaag nga T-T"
]

let step=0
let yesSize=18

const message=document.getElementById("message")
const gif=document.getElementById("gif")
const noBtn=document.getElementById("no")
const yesBtn=document.getElementById("yes")

typeWriter(apologies[0].text)

/* move button */

function moveButton(){

/* create heart trail */

const trail=document.createElement("div")
trail.innerHTML="💖"

trail.style.position="fixed"
trail.style.left=noBtn.getBoundingClientRect().left+"px"
trail.style.top=noBtn.getBoundingClientRect().top+"px"
trail.style.fontSize="22px"
trail.style.pointerEvents="none"
trail.style.transition="opacity 0.8s"

document.body.appendChild(trail)

setTimeout(()=>{
trail.style.opacity="0"
},100)

setTimeout(()=>{
trail.remove()
},800)

/* move button */

const w=noBtn.offsetWidth
const h=noBtn.offsetHeight

const x=Math.random()*(window.innerWidth-w-20)
const y=Math.random()*(window.innerHeight-h-20)

noBtn.style.position="fixed"
noBtn.style.left=x+"px"
noBtn.style.top=y+"px"

}

/* NO button */

noBtn.addEventListener("click",(e)=>{

e.preventDefault()

if(step < apologies.length-1){

step++
gif.src=apologies[step].gif
typeWriter(apologies[step].text)

return

}

moveButton()

yesSize+=8
yesBtn.style.fontSize=yesSize+"px"

typeWriter(dodgeMessages[Math.floor(Math.random()*dodgeMessages.length)])

const heart=document.createElement("div")
heart.classList.add("orbit")
heart.innerHTML="💖"
yesBtn.appendChild(heart)

setTimeout(()=>heart.remove(),3000)

})

/* CONFETTI */

function heartExplosion(){

const centerX = window.innerWidth / 2
const centerY = window.innerHeight / 2

for(let i=0;i<140;i++){

const heart = document.createElement("div")
heart.innerHTML="💖"

heart.style.position="fixed"
heart.style.left=centerX+"px"
heart.style.top=centerY+"px"

heart.style.fontSize=(16+Math.random()*24)+"px"
heart.style.pointerEvents="none"
heart.style.zIndex="9999"

document.body.appendChild(heart)

/* random explosion direction */

const angle=Math.random()*2*Math.PI
const distance=200+Math.random()*500

const x=Math.cos(angle)*distance
const y=Math.sin(angle)*distance

heart.animate([
{transform:"translate(-50%,-50%) scale(1)",opacity:1},
{transform:`translate(${x}px,${y}px) scale(0.5) rotate(${Math.random()*720}deg)`,opacity:0}
],{
duration:1200+Math.random()*800,
easing:"ease-out"
})

setTimeout(()=>heart.remove(),2000)

}

}

/* YES button */

yesBtn.addEventListener("click",()=>{

/* loading screen */

document.body.innerHTML=`

<div class="loading">

Loading forgiveness...

<div class="pulse">🥺💖🥺</div>

</div>

`

setTimeout(()=>{

/* heart explosion */

heartExplosion()

/* wait for explosion to finish */

setTimeout(()=>{

document.body.innerHTML=`

<div class="ending">

<h1>Bati na tayo ha, smile ka naaaa🥺</h1>

<img src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif"
style="width:220px;border-radius:15px;margin:20px 0;">

<p style="font-size:20px;max-width:420px;margin:auto;">
first, sorry di kayang mag sorry ng bibig ko kaya ganto nalang T-T <br><br>
Sorryyy kasi always me nag act rashly. its just because i do really like you! genuinely! :< <br><br>
Sorry kasi di ko inisip na may pinag dadaanan ka rin, naging selfish me :(( <br><br>
mag bebehave na ko pramisss, also tell me if super duper annoying na me, u can say it to my face mismo hindi ko mamasamain! :> 

</p>

<p style="font-size:32px;margin-top:20px;">sorry angeeeel kyotiii 🥺</p>

</div>

`

},1400)

},2000)



})

</script>

</body>
</html>

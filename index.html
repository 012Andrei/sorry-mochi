<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Really Sorry ❤️</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
text-align:center;
overflow:hidden;
background:linear-gradient(-45deg,#ffd6e7,#ffeef6,#ffd9ec,#ffe4f4);
background-size:400% 400%;
animation:bg 12s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* glass card */

.card{
width:85%;
max-width:380px;
margin:120px auto 40px auto;
padding:30px;

background:rgba(255,255,255,0.25);
backdrop-filter:blur(15px);
border-radius:20px;

box-shadow:
0 10px 30px rgba(0,0,0,0.15),
0 0 30px rgba(255,120,170,0.2);

animation:floatCard 4s ease-in-out infinite;
}

@keyframes floatCard{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-6px);}
}

h1{
color:#ff4d6d;
}

#gif{
width:180px;
border-radius:14px;
margin:15px 0;
}

#message{
font-size:18px;
min-height:60px;
}

/* buttons */

.buttons{
display:flex;
flex-direction:column;
align-items:center;
gap:15px;
}

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:14px;
cursor:pointer;
transition:0.25s;
}

#yes{
background:#ff4d6d;
color:white;
position:relative;
}

#no{
background:#888;
color:white;
}

/* floating hearts */

.heart{
position:absolute;
color:#ff6b81;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
from{transform:translateY(100vh);opacity:1;}
to{transform:translateY(-10vh);opacity:0;}
}

/* orbit hearts */

.orbit{
position:absolute;
font-size:18px;
animation:orbit 3s linear infinite;
}

@keyframes orbit{
from{transform:rotate(0deg) translateX(30px) rotate(0deg);}
to{transform:rotate(360deg) translateX(30px) rotate(-360deg);}
}

/* confetti */

.confetti{
position:fixed;
top:-20px;
font-size:25px;
animation:fall 3s linear forwards;
}

@keyframes fall{
from{transform:translateY(0) rotate(0deg);}
to{transform:translateY(100vh) rotate(360deg);}
}

/* loading */

.loading{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:30px;
color:#ff4d6d;
font-weight:bold;
}

.pulse{
font-size:45px;
margin-top:20px;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%,100%{opacity:0.4;}
50%{opacity:1;}
}

/* ending */

.ending{
padding:40px;
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:scale(.9);}
to{opacity:1;transform:scale(1);}
}

</style>
</head>

<body>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_2a7b0a1c9e.mp3">
</audio>

<div class="card">

<h1 id="title">I'm really sorry 🥺</h1>

<img id="gif" src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif">

<p id="message"></p>

</div>

<div class="buttons">

<button id="yes">Okay... I'll hear you out ❤️</button>
<button id="no">Still mad 😤</button>

</div>

<script>

/* start music */

document.body.addEventListener("click",()=>{
document.getElementById("music").play()
},{once:true})

/* floating hearts */

function createHeart(){

const heart=document.createElement("div")
heart.classList.add("heart")
heart.innerHTML="💖"

heart.style.left=Math.random()*100+"vw"
heart.style.fontSize=(15+Math.random()*20)+"px"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),6000)

}

setInterval(createHeart,500)

/* apology steps */

const apologies=[
{
text:"I know I messed up... and I'm really sorry.",
gif:"https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif"
},
{
text:"You mean so much to me. Seeing you upset because of me hurts.",
gif:"https://media.giphy.com/media/9Y5BbDSkSTiY8/giphy.gif"
},
{
text:"I can't undo what happened but I really want to make things right.",
gif:"https://media.giphy.com/media/l378giAZgxPw3eO52/giphy.gif"
}
]

const dodgeMessages=[
"Hey! That was close 😳",
"You almost got it!",
"Please don't press that 😭",
"You're really trying huh?",
"Okay that's cheating 😭"
]

let step=0
let yesSize=18

const message=document.getElementById("message")
const gif=document.getElementById("gif")
const noBtn=document.getElementById("no")
const yesBtn=document.getElementById("yes")

message.innerHTML=apologies[0].text

/* move button */

function moveButton(){

const w=noBtn.offsetWidth
const h=noBtn.offsetHeight

const x=Math.random()*(window.innerWidth-w-20)
const y=Math.random()*(window.innerHeight-h-20)

noBtn.style.position="fixed"
noBtn.style.left=x+"px"
noBtn.style.top=y+"px"

}

/* NO button */

noBtn.addEventListener("click",(e)=>{

e.preventDefault()

if(step < apologies.length-1){

step++
message.innerHTML=apologies[step].text
gif.src=apologies[step].gif

return

}

moveButton()

yesSize+=8
yesBtn.style.fontSize=yesSize+"px"

message.innerHTML=dodgeMessages[Math.floor(Math.random()*dodgeMessages.length)]

const heart=document.createElement("div")
heart.classList.add("orbit")
heart.innerHTML="💖"
yesBtn.appendChild(heart)

setTimeout(()=>heart.remove(),3000)

})

/* confetti */

function confetti(){

for(let i=0;i<70;i++){

const c=document.createElement("div")
c.classList.add("confetti")
c.innerHTML="💖"

c.style.left=Math.random()*100+"vw"

document.body.appendChild(c)

setTimeout(()=>c.remove(),3000)

}

}

/* YES button */

yesBtn.addEventListener("click",()=>{

document.body.innerHTML=`

<div class="loading">

Loading forgiveness...

<div class="pulse">🥺💖🥺</div>

</div>

`

setTimeout(()=>{

confetti()

document.body.innerHTML=`

<div class="ending">

<h1>Thank you for giving me another chance ❤️🥰</h1>

<img src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif"
style="width:220px;border-radius:15px;margin:20px 0;">

<p style="font-size:20px;max-width:420px;margin:auto;">
I promise I'll do better and make things right.<br><br>
You mean the world to me and I never want to hurt you again 💖
</p>

<p style="font-size:32px;margin-top:20px;">🥰💖💕✨</p>

</div>

`

},2000)

})

</script>

</body>
</html>

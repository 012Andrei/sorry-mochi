<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Really Sorry ❤️</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#ffd6e7,#ffeef6);
text-align:center;
overflow:hidden;
}

/* glass apology card */

.card{
width:85%;
max-width:380px;
margin:120px auto 40px auto;
padding:30px;

background:rgba(255,255,255,0.25);
backdrop-filter:blur(12px);
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

h1{
color:#ff4d6d;
}

#gif{
width:180px;
border-radius:12px;
margin:15px 0;
}

#message{
font-size:18px;
min-height:60px;
}

/* buttons */

.buttons{
display:flex;
flex-direction:column;
align-items:center;
gap:15px;
}

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:12px;
cursor:pointer;
transition:0.2s;
}

#yes{
background:#ff4d6d;
color:white;
}

#no{
background:#888;
color:white;
}

/* floating hearts */

.heart{
position:absolute;
color:#ff6b81;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
from{transform:translateY(100vh);opacity:1;}
to{transform:translateY(-10vh);opacity:0;}
}

/* confetti */

.confetti{
position:fixed;
top:-30px;
font-size:25px;
animation:confettiFall 3s linear forwards;
}

@keyframes confettiFall{
from{transform:translateY(0) rotate(0deg);opacity:1;}
to{transform:translateY(100vh) rotate(360deg);opacity:0;}
}

.final{
padding:40px;
}

</style>
</head>

<body>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_2a7b0a1c9e.mp3" type="audio/mpeg">
</audio>

<div class="card">

<h1>I'm really sorry 🥺</h1>

<img id="gif" src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif">

<p id="message"></p>

</div>

<div class="buttons">

<button id="yes">Okay... I'll hear you out ❤️</button>
<button id="no">Still mad 😤</button>

</div>

<script>

/* start music */

document.body.addEventListener("click",()=>{
document.getElementById("music").play()
},{once:true})

/* floating hearts */

function createHeart(){

const heart=document.createElement("div")
heart.classList.add("heart")
heart.innerHTML="💖"

heart.style.left=Math.random()*100+"vw"
heart.style.fontSize=(15+Math.random()*20)+"px"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),6000)

}

setInterval(createHeart,500)

/* apology steps */

const apologies=[
{
text:"I know I messed up... and I'm really sorry.",
gif:"https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif"
},
{
text:"You mean so much to me. Seeing you upset because of me hurts my heart.",
gif:"https://media.giphy.com/media/9Y5BbDSkSTiY8/giphy.gif"
},
{
text:"I can't undo what happened, but I really want to make things right.",
gif:"https://media.giphy.com/media/l378giAZgxPw3eO52/giphy.gif"
}
]

const dodgeMessages=[
"Hey! That was close 😳",
"You almost got it 😭",
"Please don't catch that button 🏃",
"Okay that's not fair 😭",
"You're really trying huh 😳"
]

let apologyStep=0
let yesSize=18
let dodgeMode=false

const message=document.getElementById("message")
const gif=document.getElementById("gif")
const noBtn=document.getElementById("no")
const yesBtn=document.getElementById("yes")

message.innerHTML=apologies[0].text

/* safe dodge movement */

function moveButton(){

const btnWidth=noBtn.offsetWidth
const btnHeight=noBtn.offsetHeight

const maxX=window.innerWidth-btnWidth-20
const maxY=window.innerHeight-btnHeight-20

const x=Math.random()*maxX
const y=Math.random()*maxY

noBtn.style.position="fixed"
noBtn.style.left=x+"px"
noBtn.style.top=y+"px"

}

/* NO button */

noBtn.addEventListener("click",(e)=>{

e.preventDefault()

/* apology pages first */

if(apologyStep < apologies.length-1){

apologyStep++

message.innerHTML=apologies[apologyStep].text
gif.src=apologies[apologyStep].gif

return

}

/* activate dodge mode */

dodgeMode=true

moveButton()

yesSize+=8
yesBtn.style.fontSize=yesSize+"px"

const randomMsg=dodgeMessages[Math.floor(Math.random()*dodgeMessages.length)]
message.innerHTML=randomMsg

})

/* confetti */

function heartConfetti(){

for(let i=0;i<50;i++){

const confetti=document.createElement("div")
confetti.classList.add("confetti")
confetti.innerHTML="💖"

confetti.style.left=Math.random()*100+"vw"
confetti.style.animationDuration=(2+Math.random()*2)+"s"

document.body.appendChild(confetti)

setTimeout(()=>confetti.remove(),3000)

}

}

/* YES button */

yesBtn.addEventListener("click",()=>{

heartConfetti()

setTimeout(()=>{

document.body.innerHTML=`

<div class="final">

<h1>Thank you for giving me a chance ❤️🥰</h1>

<img src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif"
style="width:220px;border-radius:15px;margin:20px 0;">

<p style="font-size:20px;max-width:420px;margin:auto;">
I promise I'll do better and make things right.<br><br>
You mean the world to me and I never want to hurt you again. 💖<br><br>
Thank you for being patient with me. 🥺❤️
</p>

<p style="font-size:30px;margin-top:20px;">
🥰💖💕✨
</p>

</div>

`

},1500)

})

</script>

</body>
</html>
